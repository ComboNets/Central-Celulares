<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Central Celulares</title>
    <meta name="description" content="Central Celulares · Catálogo de celulares nuevos y usados en Caaguazú, Paraguay" />
    <meta name="author" content="Central Celulares" />

    <link rel="icon" type="image/png" href="/central-celulares-logo.png" />

    <meta property="og:title" content="Central Celulares" />
    <meta property="og:description" content="Catálogo de celulares nuevos y usados, con precios claros y atención personalizada." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/central-celulares-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/central-celulares-logo.png" />
  </head>

  <body>
    <div id="root"></div>

    <!--
      GitHub Pages is currently serving this repository from the root, but the production build lives in /docs.
      Redirect GitHub Pages visitors to the built app while keeping local dev (localhost) working.
    -->
    <script>
      (function () {
        var isGithubPages = window.location.hostname.endsWith("github.io");
        var repoBase = "/Central-Celulares";
        var path = window.location.pathname || "/";

        if (!isGithubPages) return;
        if (!path.startsWith(repoBase)) return;

        var rest = path.slice(repoBase.length); // includes leading slash or empty
        if (!rest) rest = "/";

        // Already in /docs -> no redirect
        if (rest.startsWith("/docs/")) return;

        var target = repoBase + "/docs" + rest;
        if (!target.endsWith("/") && rest === "/") target += "/";

        window.location.replace(target + window.location.search + window.location.hash);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
